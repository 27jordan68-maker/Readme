import java.util.List;
import java.util.stream.Collectors;

public class SmartFilter {

    public List<Entity> filter(List<Entity> entities, String region, String industry) {
        return entities.stream()
                .filter(e -> region == null || region.isEmpty() || e.getRegion().equals(region))
                .filter(e -> industry == null || industry.isEmpty() || e.getIndustry().equals(industry))
                .collect(Collectors.toList());
    }
}
