        System.out.println("  промышленности, дефицит товаров народного потребления[reference:24]");
        System.out.println("===========================================================");
    }

    // Вспомогательный метод для обрезки строки до нужной длины
    private static String truncate(String s, int maxLen) {
        if (s.length() <= maxLen) return s;
        return s.substring(0, maxLen - 3) + "...";
    }

    // Вспомогательный метод для переноса длинного текста
    private static String[] wrapText(String text, int maxLen) {
12:08 PM
List<String> lines = new ArrayList<>();
        String[] words = text.split(" ");
        StringBuilder current = new StringBuilder();
        for (String word : words) {
            if (current.length() + word.length() + 1 <= maxLen) {
                if (current.length() > 0) current.append(" ");
                current.append(word);
            } else {
                lines.add(current.toString());
                current = new StringBuilder(word);
            }
        }
        if (current.length() > 0) lines.add(current.toString());
        return lines.toArray(new String[0]);
    }
}