        firstPlan.events.add(new TimelineEvent(
                LocalDate.of(1927, 4, 1),
                "IV съезд Советов СССР",
                "Законодательно закреплено начало политики индустриализации[reference:2][reference:3]"
        ));
        firstPlan.events.add(new TimelineEvent(
                LocalDate.of(1927, 4, 25),
                "Начало строительства Турксиба",
                "Железная дорога, соединившая Сибирь и Среднюю Азию[reference:4]"
        ));
        firstPlan.events.add(new TimelineEvent(
                LocalDate.of(1928, 10, 1),
                "Официальный старт первой пятилетки",
                "Начало форсированной индустриализации[reference:5][reference:6]"
        ));
        firstPlan.events.add(new TimelineEvent(
                LocalDate.of(1929, 4, 1),
                "XVI конференция ВКП(б)",
                "Одобрен первый пятилетний план[reference:7]"
        ));
        firstPlan.events.add(new TimelineEvent(
                LocalDate.of(1929, 1, 1),
                "Год великого перелома",
                "Начало сплошной коллективизации и форсированной индустриализации[reference:8][reference:9]"
        ));
        firstPlan.events.add(new TimelineEvent(
                LocalDate.of(1930, 4, 25),
                "Завершение строительства Турксиба",
