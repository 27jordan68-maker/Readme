        plans.add(thirdPlan);

        // --- ВЫВОД ЛЕНТЫ ВРЕМЕНИ ---
        System.out.println("===========================================================");
        System.out.println("   ЛЕНТА ВРЕМЕНИ: ИНДУСТРИАЛИЗАЦИЯ В СССР (1925 – 1941)");
        System.out.println("===========================================================\n");

        for (FiveYearPlan plan : plans) {
