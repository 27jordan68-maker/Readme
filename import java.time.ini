        plans.add(firstPlan);

        // --- ВТОРАЯ ПЯТИЛЕТКА (1933-1937) ---
        FiveYearPlan secondPlan = new FiveYearPlan("Вторая пятилетка", "1933 – 1937 гг.");
        secondPlan.events.add(new TimelineEvent(
                LocalDate.of(1933, 1, 1),
