            // Сортируем события по дате
            plan.events.sort(Comparator.comparing(e -> e.date));

            for (TimelineEvent event : plan.events) {
                String dateStr = event.date.format(formatter);
                System.out.printf("│ %-10s │ %-35s │\n", dateStr, truncate(event.title, 35));
                // Выводим описание с отступом
                String[] descLines = wrapText(event.description, 45);
                for (int i = 0; i < descLines.length; i++) {
                    if (i == 0) {
                        System.out.printf("│           │ %-35s │\n", truncate(descLines[i], 35));
                    } else {
                        System.out.printf("│           │ %-35s │\n", truncate(descLines[i], 35));
                    }
                }
                System.out.println("├─────────────────────────────────────────────────────────┤");
            }
            System.out.println();
        }

