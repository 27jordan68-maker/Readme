 import java.time.LocalDate;
import java.time.format.DateTimeFormatter;
import java.util.*;

/**
 * Программа для отображения ленты времени индустриализации в СССР.
 * Данные основаны на исторических источниках.
 */
public class IndustrializationTimeline {

    static class TimelineEvent {
        LocalDate date;
        String title;
        String description;

        TimelineEvent(LocalDate date, String title, String description) {
            this.date = date;
            this.title = title;
            this.description = description;
        }
    }

    static class FiveYearPlan {
        String name;
        String period;
        List<TimelineEvent> events = new ArrayList<>();

        FiveYearPlan(String name, String period) {
            this.name = name;
            this.period = period;
        }
    }

    public static void main(String[] args) {
        // Форматтер для вывода дат
        DateTimeFormatter formatter = DateTimeFormatter.ofPattern("dd.MM.yyyy");

        // Создаем список пятилеток
        List<FiveYearPlan> plans = new ArrayList<>();

