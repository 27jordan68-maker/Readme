
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наша история</title>
  <style>
    /* ----- Общие стили ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f8fafc;
      color: #0b1a2e;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    /* ----- Заголовок ----- */
    .header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 1.2rem;
      color: #475569;
      margin-top: 0.5rem;
      font-weight: 300;
    }

    /* ----- Timeline (вертикальная линия) ----- */
    .timeline {
      position: relative;
      padding: 2rem 0;
    }

    /* Вертикальная линия */
    .timeline::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, #2563eb, #7c3aed);
      transform: translateX(-50%);
      border-radius: 4px;
    }

    /* ----- Каждый элемент ----- */
    .timeline-item {
      display: flex;
      justify-content: flex-end;
      padding-right: calc(50% + 30px);
      position: relative;
      margin-bottom: 3.5rem;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .timeline-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Чётные элементы — слева */
    .timeline-item:nth-child(even) {
      justify-content: flex-start;
      padding-right: 0;
      padding-left: calc(50% + 30px);
    }

    /* Кружок на линии */
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 8px;
      width: 20px;
      height: 20px;
      background: white;
      border: 4px solid #2563eb;
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: 1;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
      transition: all 0.3s;
    }

    .timeline-item.visible::before {
      background: #2563eb;
      box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.15);
    }

    /* Карточка события */
    .timeline-content {
      background: white;
      padding: 1.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .timeline-item:nth-child(odd) .timeline-content {
      text-align: right;
    }

    .timeline-item:nth-child(even) .timeline-content {
      text-align: left;
    }

    .timeline-content:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    .timeline-content .date {
      display: inline-block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #2563eb;
      background: #e0e7ff;
      padding: 0.2rem 1rem;
      border-radius: 20px;
      letter-spacing: 0.3px;
      margin-bottom: 0.6rem;
    }

    .timeline-content h3 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #0b1a2e;
    }

    .timeline-content p {
      color: #475569;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    /* ----- Адаптивность (мобильные) ----- */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 2.2rem;
      }

      .timeline::before {
        left: 20px;
      }

      .timeline-item,
      .timeline-item:nth-child(even) {
12:05 PM
padding-left: 50px;
        padding-right: 0;
        justify-content: flex-start;
      }

      .timeline-item::before {
        left: 20px;
        top: 12px;
      }

      .timeline-item:nth-child(odd) .timeline-content,
      .timeline-item:nth-child(even) .timeline-content {
        text-align: left;
      }

      .timeline-content {
        max-width: 100%;
        padding: 1.2rem 1.5rem;
      }

      .timeline-item {
        margin-bottom: 2.5rem;
      }
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.8rem;
      }
      .timeline-content h3 {
        font-size: 1.2rem;
      }
      .timeline-content {
        padding: 1rem;
      }
    }

    /* ----- Анимация задержки для каждого элемента ----- */
    .timeline-item:nth-child(1) { transition-delay: 0.05s; }
    .timeline-item:nth-child(2) { transition-delay: 0.10s; }
    .timeline-item:nth-child(3) { transition-delay: 0.15s; }
    .timeline-item:nth-child(4) { transition-delay: 0.20s; }
    .timeline-item:nth-child(5) { transition-delay: 0.25s; }
    .timeline-item:nth-child(6) { transition-delay: 0.30s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Наша история</h1>
      <p>Ключевые моменты нашего пути</p>
    </div>

    <div class="timeline">
      <!-- Событие 1 -->
      <div class="timeline-item">
        <div class="timeline-content">
          <span class="date">2018</span>
          <h3>Основание</h3>
          <p>Компания основана с целью создания инновационных решений для бизнеса.</p>
        </div>
      </div>

      <!-- Событие 2 -->
      <div class="timeline-item">
        <div class="timeline-content">
          <span class="date">2019</span>
          <h3>Первый офис</h3>
          <p>Открытие первого офиса в центре города, команда выросла до 10 человек.</p>
        </div>
      </div>

      <!-- Событие 3 -->
      <div class="timeline-item">
        <div class="timeline-content">
          <span class="date">2020</span>
          <h3>Запуск продукта</h3>
          <p>Презентация флагманского продукта, который изменил подход клиентов к работе.</p>
        </div>
      </div>

      <!-- Событие 4 -->
      <div class="timeline-item">
        <div class="timeline-content">
          <span class="date">2022</span>
          <h3>Международное признание</h3>
          <p>Получение премии «Лучший стартап года» и выход на зарубежные рынки.</p>
        </div>
      </div>

      <!-- Событие 5 -->
      <div class="timeline-item">
        <div class="timeline-content">
          <span class="date">2024</span>
          <h3>Новый этап</h3>
          <p>Запуск AI-платформы и привлечение инвестиций в размере 5 млн $.</p>
        </div>
      </div>

      <!-- Событие 6 -->
      <div class="timeline-item">
        <div class="timeline-content">
          <span class="date">2025</span>
          <h3>1000 клиентов</h3>
          <p>Достигнута отметка в 1000 активных клиентов по всему миру.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Анимация появления при скролле (Intersection Observer)
    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.timeline-item');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, {
        threshold: 0.2,
        rootMargin: '0px 0px -40px 0px'
      });

      items.forEach(item => observer.observe(item));
    });
  </script>
</body>
</html>